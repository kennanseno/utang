openapi: 3.0.3
info:
  title: Utang API
  description: >
    MVP API for tracking customer utang (debt), recording payments, generating
    copyable reminders. Ledger-first design.
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
  - name: Customers
  - name: Ledger
  - name: Reminders
  - name: Public

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a store owner (username + password + email + mobile)
      description: >
        Creates the store account and signs the owner in. Store name, username,
        email and mobile number must each be unique; a conflict returns 409 with a
        deliberately generic message that does not reveal which detail is already
        in use.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered and authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          $ref: '#/components/responses/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with username + password
      description: >
        Password-only login. Returns a session token and the store profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Error'

  /me:
    get:
      tags: [Auth]
      summary: Current store
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'

  /store:
    put:
      tags: [Auth]
      summary: Update store details
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreRequest'
      responses:
        '200':
          description: Updated store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'
        '401':
          $ref: '#/components/responses/Error'

  /store/email/verify/request:
    post:
      tags: [Auth]
      summary: Send a code to verify ownership of the store's email address
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification code sent to the store's email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'

  /store/email/verify/confirm:
    post:
      tags: [Auth]
      summary: Confirm the code and mark the email address as verified
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '200':
          description: Email address verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'
        '401':
          $ref: '#/components/responses/Error'

  /store/qr:
    get:
      tags: [Auth]
      summary: Get the store's payment QR code image
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The QR code image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: No QR code uploaded
    put:
      tags: [Auth]
      summary: Upload or replace the store's payment QR code image
      description: >
        Accepts a PNG, JPG, WebP or GIF image up to 2 MB. Replaces any existing
        QR code. The image is stored inline with the store record.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: QR code saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Auth]
      summary: Remove the store's payment QR code image
      security:
        - bearerAuth: []
      responses:
        '200':
          description: QR code removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'
        '401':
          $ref: '#/components/responses/Error'

  /customers:
    post:
      tags: [Customers]
      summary: Add a customer (suki)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '200':
          description: Created customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
    get:
      tags: [Customers]
      summary: List customers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerResponse'

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Get a customer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          $ref: '#/components/responses/Error'
    put:
      tags: [Customers]
      summary: Update a customer's name and mobile number
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
      responses:
        '200':
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Customers]
      summary: Delete a customer and all their ledger entries
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/Error'

  /ledger/debit:
    post:
      tags: [Ledger]
      summary: Add utang (DEBIT)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerMutationRequest'
      responses:
        '200':
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'

  /ledger/credit:
    post:
      tags: [Ledger]
      summary: Record bayad (CREDIT) — e.g. cash payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerMutationRequest'
      responses:
        '200':
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'

  /customers/{id}/ledger:
    get:
      tags: [Ledger]
      summary: Ledger history for a customer (paged, newest first)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Page size (max 100).
          schema:
            type: integer
            format: int32
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Ledger
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerResponse'

  /customers/{id}/reminder-preview:
    get:
      tags: [Reminders]
      summary: Preview a reminder message
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderPreviewResponse'

  /public/stats:
    get:
      tags: [Public]
      summary: Aggregate usage stats for the landing page (no auth)
      responses:
        '200':
          description: Public usage stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicStatsResponse'

  /public/pay/{token}:
    get:
      tags: [Public]
      summary: Public payment page data (no auth, paged history)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Zero-based page index for transaction history.
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: History page size (max 100).
          schema:
            type: integer
            format: int32
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Public pay info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicPayResponse'
        '404':
          $ref: '#/components/responses/Error'

  /public/pay/{token}/qr:
    get:
      tags: [Public]
      summary: Store's payment QR code image (no auth)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: QR code image
          content:
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: Store has no QR code

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    CustomerId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegisterRequest:
      type: object
      required: [username, password, phoneNumber, email, storeName]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 60
          pattern: "^[a-zA-Z0-9]+$"
          example: "alingnena"
        password:
          type: string
          format: password
          minLength: 6
          example: "s3cret!"
        phoneNumber:
          type: string
          example: "09171234567"
        email:
          type: string
          format: email
          example: "nena@example.com"
        storeName:
          type: string
          example: "Aling Nena Store"
        ownerName:
          type: string
          nullable: true
          example: "Nena Reyes"
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: "aling.nena"
        password:
          type: string
          format: password
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        store:
          $ref: '#/components/schemas/StoreResponse'
    UpdateStoreRequest:
      type: object
      required: [storeName, phoneNumber, email]
      properties:
        storeName:
          type: string
          example: "Aling Nena Store"
        ownerName:
          type: string
          nullable: true
          example: "Nena Reyes"
        phoneNumber:
          type: string
          description: Contact number shown to sukis; not verified.
          example: "09171234567"
        email:
          type: string
          format: email
          description: Changing this resets emailVerified to false until re-verified.
          example: "nena@example.com"
    EmailVerificationRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          example: "123456"
    EmailVerificationResponse:
      type: object
      properties:
        email:
          type: string
          description: Masked email address the code was sent to.
          example: "n•••@example.com"
        devCode:
          type: string
          nullable: true
          description: Echoed only when email delivery is not configured.
    StoreResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
          nullable: true
        phoneNumber:
          type: string
        email:
          type: string
          nullable: true
        name:
          type: string
        ownerName:
          type: string
          nullable: true
        onboarded:
          type: boolean
        emailVerified:
          type: boolean
        hasQrCode:
          type: boolean
          description: Whether a payment QR code image has been uploaded (fetch it from GET /store/qr).
    CreateCustomerRequest:
      type: object
      required: [name, phoneNumber]
      properties:
        name:
          type: string
        phoneNumber:
          type: string
    UpdateCustomerRequest:
      type: object
      required: [name, phoneNumber]
      properties:
        name:
          type: string
        phoneNumber:
          type: string
    CustomerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        phoneNumber:
          type: string
          nullable: true
        currentBalance:
          type: number
        payToken:
          type: string
    LedgerMutationRequest:
      type: object
      required: [customerId, amount]
      properties:
        customerId:
          type: integer
          format: int64
        amount:
          type: number
        note:
          type: string
          nullable: true
    LedgerEntryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [DEBIT, CREDIT]
        amount:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    LedgerResponse:
      type: object
      properties:
        customerId:
          type: integer
          format: int64
        currentBalance:
          type: number
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LedgerEntryResponse'
        page:
          type: integer
          format: int32
          description: Zero-based index of this page.
        size:
          type: integer
          format: int32
          description: Number of entries per page.
        totalEntries:
          type: integer
          format: int64
          description: Total number of ledger entries for the customer.
        hasMore:
          type: boolean
          description: Whether more (older) entries exist beyond this page.
    ReminderPreviewResponse:
      type: object
      properties:
        message:
          type: string
    PublicPayResponse:
      type: object
      properties:
        storeName:
          type: string
        storePhoneNumber:
          type: string
        customerName:
          type: string
        outstandingBalance:
          type: number
        storeHasQrCode:
          type: boolean
        history:
          type: array
          items:
            $ref: '#/components/schemas/PublicLedgerEntry'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalHistory:
          type: integer
          format: int64
        hasMore:
          type: boolean
    PublicLedgerEntry:
      type: object
      properties:
        type:
          type: string
          enum: [DEBIT, CREDIT]
        amount:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    PublicStatsResponse:
      type: object
      properties:
        storeCount:
          type: integer
          format: int64
        customerCount:
          type: integer
          format: int64
        totalRecorded:
          type: number
        totalCollected:
          type: number
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
        error:
          type: string
        message:
          type: string
