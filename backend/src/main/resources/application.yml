server:
  port: 8080

spring:
  application:
    name: utang-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/utang}
    username: ${DB_USER:utang}
    password: ${DB_PASSWORD:utang}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

# Application-specific config
utang:
  # Base URL used to build public payment links surfaced in reminder messages.
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:3000}
  paymongo:
    # PayMongo secret key. Leave blank to run the built-in mock adapter (no external calls).
    secret-key: ${PAYMONGO_SECRET_KEY:}
    webhook-secret: ${PAYMONGO_WEBHOOK_SECRET:whsk_test_local}
    base-url: ${PAYMONGO_BASE_URL:https://api.paymongo.com/v1}

logging:
  level:
    com.utang: INFO
