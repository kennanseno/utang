server:
  port: 8080

spring:
  application:
    name: utang-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/utang}
    username: ${DB_USER:utang}
    password: ${DB_PASSWORD:utang}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

# Swagger UI (spec-first). The UI renders the hand-written openapi.yaml.
#   Swagger UI:  http://localhost:8080/swagger-ui.html
#   Raw spec:    http://localhost:8080/openapi.yaml
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    # Hide the auto-generated definition; only the spec-first doc is shown.
    disable-swagger-default-url: true

# Application-specific config
utang:
  # Base URL used to build public payment links surfaced in reminder messages.
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:3000}
  otp:
    # OTP lifetime and per-number request throttling (anti-SMS-pumping).
    ttl-minutes: ${OTP_TTL_MINUTES:5}
    resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:60}
    max-per-hour: ${OTP_MAX_PER_HOUR:5}
  paymongo:
    # PayMongo secret key. Leave blank to run the built-in mock adapter (no external calls).
    secret-key: ${PAYMONGO_SECRET_KEY:}
    webhook-secret: ${PAYMONGO_WEBHOOK_SECRET:whsk_test_local}
    base-url: ${PAYMONGO_BASE_URL:https://api.paymongo.com/v1}
  twilio:
    # Twilio credentials for SMS (OTP + reminders). Leave blank to log messages
    # instead of delivering them (no external calls).
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    # Sender number in E.164 format, e.g. +639171234567.
    from-number: ${TWILIO_FROM_NUMBER:}
    # Optional Messaging Service SID (MG…). When set, it takes precedence over from-number.
    messaging-service-sid: ${TWILIO_MESSAGING_SERVICE_SID:}
    base-url: ${TWILIO_BASE_URL:https://api.twilio.com/2010-04-01}

logging:
  level:
    com.utang: INFO
