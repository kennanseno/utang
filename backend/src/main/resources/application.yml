server:
  port: 8080

spring:
  application:
    name: utang-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/utang}
    username: ${DB_USER:utang}
    password: ${DB_PASSWORD:utang}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      # QR code image uploads are capped at 2 MB (enforced again in the service).
      max-file-size: 2MB
      max-request-size: 3MB

# Swagger UI (spec-first). The UI renders the hand-written openapi.yaml.
#   Swagger UI:  http://localhost:8080/swagger-ui.html
#   Raw spec:    http://localhost:8080/openapi.yaml
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    # Hide the auto-generated definition; only the spec-first doc is shown.
    disable-swagger-default-url: true

# Application-specific config
utang:
  # Base URL used to build public payment links surfaced in reminder messages.
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:3000}
  otp:
    # Verification-code lifetime and per-email request throttling (anti-abuse).
    ttl-minutes: ${OTP_TTL_MINUTES:5}
    resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:60}
    max-per-hour: ${OTP_MAX_PER_HOUR:5}
  resend:
    # Resend transactional email (account verification codes). Leave the API key
    # blank to log codes to the console instead of delivering them (no external calls).
    api-key: ${RESEND_API_KEY:}
    # Verified sender, e.g. "Utang <no-reply@yourdomain.com>".
    from-email: ${RESEND_FROM_EMAIL:}
    base-url: ${RESEND_BASE_URL:https://api.resend.com}

logging:
  level:
    com.utang: INFO
