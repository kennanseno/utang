services:
  db:
    image: postgres:16-alpine
    container_name: utang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: utang
      POSTGRES_USER: utang
      POSTGRES_PASSWORD: utang
    ports:
      - "5432:5432"
    volumes:
      - utang_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utang -d utang"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  utang_pgdata:
